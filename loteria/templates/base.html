<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Loteria{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            background-color: #2c3e50;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        nav .brand {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
        }
        nav .nav-links {
            display: flex;
            gap: 20px;
        }
        nav .nav-links a {
            color: #ecf0f1;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        nav .nav-links a:hover {
            background-color: #34495e;
        }
        main {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 30px auto;
            padding: 0 20px;
        }
        footer {
            background-color: #2c3e50;
            color: #ecf0f1;
            text-align: center;
            padding: 15px;
            font-size: 13px;
        }
        .messages {
            list-style: none;
            margin-bottom: 20px;
        }
        .messages li {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .messages .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .messages .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .messages .warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .messages .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav>
        <a href="{% url 'index' %}" class="brand">Sistema de Loteria</a>
        <div class="nav-links">
            <a href="{% url 'index' %}">Inicio</a>
            <a href="{% url 'loteria:registrar' %}">Registrar Numero</a>
            <a href="{% url 'loteria:listar' %}">Listar Numeros</a>
        </div>
    </nav>

    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Sistema de Gestion de Resultados de Loteria &copy; 2026</p>
    </footer>

</body>
</html>
